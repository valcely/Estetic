<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Esthetic Clinic Simulator V3</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="background"></div>

  <div class="particles"></div>

  <!-- LOGIN -->

  <section id="loginScreen" class="login-screen">

    <div class="glass-card">

      <h1>ESTHETIC CLINIC</h1>

      <p class="subtitle">
        Premium Medical Aesthetic Simulator
      </p>

      <input
        type="text"
        id="doctorName"
        placeholder="Nome profissional">

      <select id="profession">

        <option>Médico(a)</option>
        <option>Enfermeiro(a)</option>
        <option>Biomédico(a)</option>
        <option>Dentista</option>
        <option>Esteticista</option>
        <option>Farmacêutico(a)</option>

      </select>

      <input
        type="text"
        id="clinicName"
        placeholder="Nome da clínica">

      <button onclick="startGame()">
        Entrar no Consultório
      </button>

    </div>

  </section>

  <!-- GAME -->

  <section id="gameScreen" class="game-screen hidden">

    <header>

      <div class="profile">

        <h2 id="doctorDisplay">
          Dra. Valcely
        </h2>

        <p id="professionDisplay">
          Enfermeira Esteta
        </p>

        <span id="clinicDisplay">
          VC Clinic
        </span>

      </div>

      <div class="hud">

        <div class="hud-box">

          <span>XP</span>

          <h3 id="xp">0</h3>

        </div>

        <div class="hud-box">

          <span>Nível</span>

          <h3 id="level">1</h3>

        </div>

        <div class="hud-box">

          <span>Coins</span>

          <h3 id="coins">100</h3>

        </div>

      </div>

      <div class="real-info">

        <span id="clock"></span>

        <span id="date"></span>

      </div>

    </header>

    <main>

      <!-- LEFT -->

      <section class="left-panel">

        <div class="doctor-card floating">

          <img
            src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?q=80&w=1200&auto=format&fit=crop"
            class="doctor-img">

          <div class="doctor-info">

            <h2 id="doctorCardName">
              Dra.
            </h2>

            <p id="doctorCardProfession">
              Enfermeira Esteta
            </p>

          </div>

        </div>

        <div class="patient-card floating">

          <img
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
            id="patientImage"
            class="patient-img">

          <div class="patient-info">

            <h2 id="patientName">
              Ana Paula
            </h2>

            <p id="patientAge">
              36 anos • Fototipo III
            </p>

            <span id="patientIssue">
              Rugas frontais
            </span>

          </div>

        </div>

      </section>

      <!-- CENTER -->

      <section class="center-panel">

        <div class="zoom-card">

          <img
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop"
            id="zoomFace"
            class="zoom-face">

          <div class="scan-line"></div>

        </div>

        <div class="procedure-buttons">

          <button onclick="chooseProcedure('botox')">
            💉 Botox
          </button>

          <button onclick="chooseProcedure('acido')">
            ✨ Ácido Hialurônico
          </button>

          <button onclick="chooseProcedure('micro')">
            🩸 Microagulhamento
          </button>

          <button onclick="chooseProcedure('bio')">
            🌟 Bioestimulador
          </button>

        </div>

        <div id="feedback" class="feedback">
          Escolha um protocolo.
        </div>

      </section>

      <!-- RIGHT -->

      <section class="right-panel">

        <div class="science-card">

          <h2>
            Protocolo Científico
          </h2>

          <div id="scienceContent">

            <p>
              Selecione um procedimento.
            </p>

          </div>

        </div>

      </section>

    </main>

  </section>

  <audio
    id="clickSound"
    src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=click-124467.mp3">
  </audio>

  <script src="script.js"></script>

</body>

</html>
